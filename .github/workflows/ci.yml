name: CI

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Lint / type-check once (version-independent tooling); fast fail.
  lint:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Install package and tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install ruff mypy

      - name: ruff check
        run: ruff check kflash tests

      # ruff format is intentionally NOT adopted (see pyproject.toml comments):
      # the formatter would produce an enormous diff on flash.py, which is slated
      # for a Phase 2 refactor. Lint-only (including import sorting) is enforced
      # above, so there is no `ruff format --check` step here.

      - name: mypy
        run: mypy kflash

  shellcheck:
    name: Shellcheck install.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Default behavior scans the repo for shell scripts; install.sh is found
      # by its .sh extension.
      - uses: ludeeus/action-shellcheck@2.0.0

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and test tooling
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Byte-compile package
        run: python -m compileall kflash

      - name: Import smoke test
        run: python -c "import kflash; from kflash import flash; print(kflash.__version__)"

      - name: pytest
        run: pytest
